name: Deploy — Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Trigger Coolify production deploy
    runs-on: ubuntu-latest

    steps:
      - name: Trigger Coolify deploy (API)
        run: |
          curl --fail -X POST "${{ secrets.COOLIFY_PROD_API_WEBHOOK }}" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_PROD_API_TOKEN }}"

      - name: Trigger Coolify deploy (Web)
        run: |
          curl --fail -X POST "${{ secrets.COOLIFY_PROD_WEB_WEBHOOK }}" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_PROD_WEB_TOKEN }}"
