name: CLI (npm)

on:
  pull_request:
    branches: [main, develop]
    paths:
      - "packages/cli/**"
      - ".github/workflows/cli-npm.yml"
  push:
    branches: [develop]
    paths:
      - "packages/cli/**"
      - ".github/workflows/cli-npm.yml"

# Read-only by default. The publish path lives in cli-release.yml.
permissions:
  contents: read

defaults:
  run:
    working-directory: packages/cli

jobs:
  lint:
    name: Node syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Validate package.json
        run: node -e "JSON.parse(require('node:fs').readFileSync('package.json'))"
      - name: Syntax-check JS sources
        run: |
          node --check bin/ruleshub.js
          node --check tools/install.js

  smoke:
    name: smoke (Node ${{ matrix.node }} on ${{ matrix.os }})
    needs: lint
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: ["20", "22"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      - name: Pack the wrapper
        shell: bash
        run: |
          set -euo pipefail
          npm pack --pack-destination "$RUNNER_TEMP"
          ls "$RUNNER_TEMP"/ruleshub-*.tgz

      - name: Install pack into a fresh consumer
        # Pin RULESHUB_VERSION to a known-published binary version,
        # same approach as the Composer + pip smoke tests. This way
        # CI verifies *wrapper behaviour* against a real release,
        # independent of what's currently in tools/install.js's
        # BINARY_VERSION constant (which may track an unreleased PR).
        shell: bash
        env:
          RULESHUB_VERSION: 0.1.0
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/consumer"
          cd "$RUNNER_TEMP/consumer"
          npm init -y >/dev/null
          tarball=$(ls "$RUNNER_TEMP"/ruleshub-*.tgz | head -1)
          echo "installing $tarball"
          npm install "$tarball"

      - name: Verify launcher works
        shell: bash
        run: |
          set -euo pipefail
          cd "$RUNNER_TEMP/consumer"
          ./node_modules/.bin/ruleshub --version
          ./node_modules/.bin/ruleshub --version | grep -q 'ruleshub 0.1.0'
