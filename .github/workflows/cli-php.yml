name: CLI (PHP)

on:
  pull_request:
    branches: [main, develop]
    paths:
      - "packages-php/**"
      - ".github/workflows/cli-php.yml"
  push:
    branches: [develop]
    paths:
      - "packages-php/**"
      - ".github/workflows/cli-php.yml"

jobs:
  lint:
    name: PHP lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          tools: composer:v2
      - name: Syntax-check sources
        run: |
          php -l packages-php/cli/src/Installer.php
          php -l packages-php/cli/src/Plugin.php
          php -l packages-php/cli/bin/ruleshub

  smoke:
    name: smoke (PHP ${{ matrix.php }} on ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        php: ["8.2", "8.3", "8.4"]
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: zip, openssl
          tools: composer:v2

      - name: Set up fresh consumer fixture
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/consumer"
          cd "$RUNNER_TEMP/consumer"
          composer init \
            --name=test/consumer \
            --type=library \
            --stability=dev \
            --no-interaction
          # Use a path repository pointing at our wrapper source.
          # symlink=false forces Composer to copy the package, so the plugin's
          # binary write doesn't pollute the actual source tree.
          composer config repositories.local --json \
            "{\"type\":\"path\",\"url\":\"$GITHUB_WORKSPACE/packages-php/cli\",\"options\":{\"symlink\":false}}"
          composer config allow-plugins.ruleshub/cli true

      - name: Require the wrapper
        shell: bash
        run: |
          set -euo pipefail
          cd "$RUNNER_TEMP/consumer"
          composer require --dev "ruleshub/cli:*@dev" --no-progress

      - name: Verify the binary launches
        shell: bash
        run: |
          set -euo pipefail
          cd "$RUNNER_TEMP/consumer"
          ./vendor/bin/ruleshub --version
          ./vendor/bin/ruleshub --version | grep -q 'ruleshub 0.1.0-alpha.1'
