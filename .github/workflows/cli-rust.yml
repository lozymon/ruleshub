name: CLI (Rust)

on:
  pull_request:
    branches: [main, develop]
    paths:
      - "packages-rs/**"
      - ".github/workflows/cli-rust.yml"
  push:
    branches: [develop]
    paths:
      - "packages-rs/**"
      - ".github/workflows/cli-rust.yml"

# Read-only by default. The publish path lives in cli-release.yml.
permissions:
  contents: read

defaults:
  run:
    working-directory: packages-rs/cli

jobs:
  # Third-party actions are pinned to a full commit SHA so a moving tag
  # (or compromised maintainer) can't silently change the code that runs
  # with our GITHUB_TOKEN. Trailing comment is the tag this SHA tracks.
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
          components: rustfmt
      - run: cargo fmt --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
          components: clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: packages-rs/cli
      - run: cargo clippy --all-targets -- -D warnings

  build:
    name: build & test (${{ matrix.toolchain }} on ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        toolchain: [stable, beta]
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      # Channel comes from the matrix via `with: toolchain` — the SHA pin
      # just locks the action code.
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # master
        with:
          toolchain: ${{ matrix.toolchain }}
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: packages-rs/cli
      - run: cargo build --verbose
      - run: cargo test --verbose
