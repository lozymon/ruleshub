name: CLI Release

on:
  push:
    tags:
      - "cli-v*"

permissions:
  contents: write

defaults:
  run:
    working-directory: packages-rs/cli

jobs:
  build:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            cross: true
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            cross: true
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            cross: true
          # Both Mac targets build on macos-latest (Apple Silicon).
          # x86_64 is a cross-compile via the rustup target; macos-13 (Intel)
          # had thin runner capacity post-deprecation.
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages-rs/cli
          key: ${{ matrix.target }}

      - name: Install cross (Linux ARM64 only)
        if: matrix.cross
        run: cargo install cross --locked

      - name: Build (native)
        if: ${{ !matrix.cross }}
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build (cross)
        if: matrix.cross
        run: cross build --release --target ${{ matrix.target }}

      - name: Package archive
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#cli-v}"
          NAME="ruleshub-${VERSION}-${{ matrix.target }}"
          mkdir -p "dist/${NAME}"
          if [[ "${{ matrix.target }}" == *windows* ]]; then
            cp "target/${{ matrix.target }}/release/ruleshub.exe" "dist/${NAME}/"
            (cd dist && 7z a "${NAME}.zip" "${NAME}" >/dev/null)
          else
            cp "target/${{ matrix.target }}/release/ruleshub" "dist/${NAME}/"
            (cd dist && tar czf "${NAME}.tar.gz" "${NAME}")
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.target }}
          path: |
            packages-rs/cli/dist/*.tar.gz
            packages-rs/cli/dist/*.zip
          if-no-files-found: error

  release:
    name: GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        # Override workflow-level working-directory: download-artifact
        # places files at ${{ github.workspace }}/artifacts, not under
        # packages-rs/cli where the rest of the jobs operate.
        working-directory: ${{ github.workspace }}/artifacts
        run: |
          sha256sum ruleshub-* > SHA256SUMS
          cat SHA256SUMS

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/ruleshub-*
            artifacts/SHA256SUMS
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          draft: false
          # auto-flag pre-release semver tags (cli-v0.1.0-alpha.1) as prereleases
          prerelease: ${{ contains(github.ref_name, '-') }}

  publish-crate:
    name: Publish to crates.io
    needs: build
    runs-on: ubuntu-latest
    if: github.repository == 'lozymon/ruleshub'
    environment: ruleshub-env
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages-rs/cli

      - name: Verify Cargo.toml version matches tag
        shell: bash
        run: |
          set -euo pipefail
          TAG_VERSION="${GITHUB_REF_NAME#cli-v}"
          CRATE_VERSION=$(awk -F'"' '/^version *=/ {print $2; exit}' Cargo.toml)
          if [ "$TAG_VERSION" != "$CRATE_VERSION" ]; then
            echo "::error::tag $TAG_VERSION does not match Cargo.toml version $CRATE_VERSION"
            exit 1
          fi
          echo "publishing ruleshub@$CRATE_VERSION"

      - name: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        run: cargo publish --locked

  composer-split:
    name: Subtree split → ruleshub-cli-php
    needs: release
    runs-on: ubuntu-latest
    if: github.repository == 'lozymon/ruleshub'
    environment: ruleshub-env
    defaults:
      run:
        working-directory: ${{ github.workspace }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure SSH for split repo
        env:
          DEPLOY_KEY: ${{ secrets.COMPOSER_SPLIT_DEPLOY_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$DEPLOY_KEY" > ~/.ssh/split_key
          chmod 600 ~/.ssh/split_key
          cat > ~/.ssh/config <<'EOF'
          Host split.github.com
            HostName github.com
            User git
            IdentityFile ~/.ssh/split_key
            IdentitiesOnly yes
            StrictHostKeyChecking accept-new
          EOF
          ssh-keyscan github.com >> ~/.ssh/known_hosts 2>/dev/null

      - name: Configure git identity
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"

      - name: Verify Composer plugin BINARY_VERSION matches tag
        run: |
          set -euo pipefail
          TAG_VERSION="${GITHUB_REF_NAME#cli-v}"
          PLUGIN_VERSION=$(awk -F"'" '/BINARY_VERSION *=/ {print $2; exit}' packages-php/cli/src/Installer.php)
          if [ "$TAG_VERSION" != "$PLUGIN_VERSION" ]; then
            echo "::error::tag $TAG_VERSION does not match Installer.php BINARY_VERSION $PLUGIN_VERSION"
            echo "::error::bump packages-php/cli/src/Installer.php BINARY_VERSION before tagging"
            exit 1
          fi
          echo "splitting ruleshub/cli@$PLUGIN_VERSION"

      - name: Split + push to ruleshub-cli-php
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#cli-v}"
          TAG="v${VERSION}"

          # git subtree split is built into git, no external tool needed.
          # Outputs the SHA of the synthetic tree containing only the prefix's
          # history. Stable across re-runs for the same input.
          SPLIT_SHA=$(git subtree split --prefix=packages-php/cli/)
          echo "split SHA: $SPLIT_SHA"

          git remote add split git@split.github.com:lozymon/ruleshub-cli-php.git
          # Force-push allowed because the split repo is push-only — we never
          # edit it directly. main always reflects the latest tagged release.
          git push split "+${SPLIT_SHA}:refs/heads/main"
          git push split "+${SPLIT_SHA}:refs/tags/${TAG}"

          echo "pushed to ruleshub-cli-php @ main and tag $TAG"

  pypi-publish:
    name: Publish wheels to PyPI
    needs: release
    runs-on: ubuntu-latest
    if: github.repository == 'lozymon/ruleshub'
    environment: pypi
    permissions:
      id-token: write # required for OIDC trusted publishing to PyPI
    defaults:
      run:
        working-directory: packages-py/cli
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Verify pyproject.toml version matches tag
        shell: bash
        run: |
          set -euo pipefail
          TAG_VERSION="${GITHUB_REF_NAME#cli-v}"
          # Normalize semver pre-release (alpha.N/beta.N/rc.N) to PEP 440
          # form (aN/bN/rcN). Cargo's "0.1.0-alpha.4" becomes Python's
          # "0.1.0a4" — same release, different ecosystem string convention.
          EXPECTED=$(echo "$TAG_VERSION" \
            | sed -E 's/-alpha\.([0-9]+)/a\1/' \
            | sed -E 's/-beta\.([0-9]+)/b\1/' \
            | sed -E 's/-rc\.([0-9]+)/rc\1/')
          PY_VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          if [ "$EXPECTED" != "$PY_VERSION" ]; then
            echo "::error::tag $TAG_VERSION (PEP 440: $EXPECTED) does not match pyproject.toml version $PY_VERSION"
            echo "::error::bump packages-py/cli/pyproject.toml version before tagging"
            exit 1
          fi
          echo "publishing ruleshub@$PY_VERSION (from cli-v$TAG_VERSION)"

      - name: Install build tools
        run: pip install build wheel

      - name: Build all 7 platform wheels
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#cli-v}"
          python tools/build_wheels.py --version "$TAG_VERSION"

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: packages-py/cli/dist
