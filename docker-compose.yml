services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ruleshub
      POSTGRES_PASSWORD: ruleshub
      POSTGRES_DB: ruleshub
    # Bind to the loopback interface only — this compose file is dev-only,
    # and the default `"5432:5432"` shorthand binds 0.0.0.0, exposing
    # Postgres with the trivial `ruleshub:ruleshub` credentials to the LAN.
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  minio:
    # Pin a dated release — the bare `minio/minio` tag tracks `latest`,
    # which breaks reproducibility and is a supply-chain footgun.
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ruleshub
      MINIO_ROOT_PASSWORD: ruleshub_secret
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    volumes:
      - minio_data:/data

  adminer:
    image: adminer:4.8.1
    ports:
      - "127.0.0.1:8080:8080"
    depends_on:
      - postgres

volumes:
  postgres_data:
  minio_data:
