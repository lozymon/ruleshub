name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [develop]

jobs:
  ci:
    name: Lint, Typecheck, Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ruleshub
          POSTGRES_PASSWORD: ruleshub
          POSTGRES_DB: ruleshub_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://ruleshub:ruleshub@localhost:5432/ruleshub_test
      JWT_SECRET: ci-test-secret
      GITHUB_CLIENT_ID: ci-placeholder
      GITHUB_CLIENT_SECRET: ci-placeholder

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Run Prisma migrations (test DB)
        run: pnpm --filter api prisma migrate deploy

      - name: Test
        run: pnpm test
