services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ruleshub
      POSTGRES_PASSWORD: ruleshub
      POSTGRES_DB: ruleshub
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ruleshub
      MINIO_ROOT_PASSWORD: ruleshub_secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  adminer:
    image: adminer
    ports:
      - "8080:8080"
    depends_on:
      - postgres

volumes:
  postgres_data:
  minio_data:
